{% extends 'admin/base.html' %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block page_title %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card">
    <div class="card-header">
        <i class="fas fa-key text-warning me-2"></i>تغيير كلمة المرور
    </div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">كلمة المرور الحالية</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور الجديدة</label>
                <input type="password" name="new_password" class="form-control"
                       minlength="6" required id="newPw">
            </div>
            <div class="mb-4">
                <label class="form-label">تأكيد كلمة المرور الجديدة</label>
                <input type="password" name="confirm_password" class="form-control"
                       minlength="6" required id="confirmPw">
                <div id="pwMatch" class="form-text"></div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    <i class="fas fa-save me-2"></i>تغيير
                </button>
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('confirmPw').addEventListener('input', function() {
    const match = this.value === document.getElementById('newPw').value;
    const el = document.getElementById('pwMatch');
    el.textContent = match ? '✓ كلمتا المرور متطابقتان' : '✗ كلمتا المرور غير متطابقتين';
    el.className = 'form-text ' + (match ? 'text-success' : 'text-danger');
});
</script>
{% endblock %}
