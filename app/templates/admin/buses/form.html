{% extends 'admin/base.html' %}
{% block title %}{{ 'تعديل' if bus else 'إضافة' }} خط{% endblock %}
{% block page_title %}{{ 'تعديل' if bus else 'إضافة' }} خط{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
    <div class="card-header">
        <i class="fas fa-bus text-primary me-2"></i>بيانات الخط
    </div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">اسم الخط <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control"
                       value="{{ bus.name if bus else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">عدد المقاعد</label>
                <input type="number" name="total_seats" class="form-control" min="1" max="500"
                       value="{{ bus.total_seats if bus else 50 }}">
            </div>
            <div class="mb-3">
                <label class="form-label">السائق الأساسي</label>
                <select name="driver_id" class="form-select">
                    <option value="">-- بدون سائق --</option>
                    {% for d in drivers %}
                    <option value="{{ d.id }}" {{ 'selected' if bus and bus.driver_id == d.id }}>
                        {{ d.name }} - {{ d.phone }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">السائق البديل</label>
                <select name="backup_driver_id" class="form-select">
                    <option value="">-- بدون سائق بديل --</option>
                    {% for d in drivers %}
                    <option value="{{ d.id }}" {{ 'selected' if bus and bus.backup_driver_id == d.id }}>
                        {{ d.name }} - {{ d.phone }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">الخط البديل (عند الامتلاء)</label>
                <select name="backup_bus_id" class="form-select">
                    <option value="">-- لا يوجد خط بديل --</option>
                    {% for b in all_buses %}
                    <option value="{{ b.id }}" {{ 'selected' if bus and bus.backup_bus_id == b.id }}>
                        {{ b.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            {% if bus %}
            <div class="mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive"
                           {{ 'checked' if bus.is_active }}>
                    <label class="form-check-label" for="isActive">تفعيل الخط</label>
                </div>
            </div>
            {% endif %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>حفظ</button>
                <a href="{{ url_for('admin.buses') }}" class="btn btn-outline-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
